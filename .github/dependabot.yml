version: 2
updates:
  - package-ecosystem: "nuget"
    directories:
      - "/src"
      - "/tests"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "21:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "sunday"
      time: "21:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 10
