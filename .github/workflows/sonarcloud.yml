name: Run SonarCloud coverage scan

on:
  workflow_call:
    secrets:
      SONAR_TOKEN:
        description: "SonarCloud token used for authentication"
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build:
    if: github.run_number != 1
    name: CDP SonarCloud coverage scan
    runs-on: ubuntu-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # Alternative distribution options are available.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Set up .NET 10.0
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: |
            10.0
      - name: Cache SonarQube Cloud packages
        uses: actions/cache@v4
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache SonarQube Cloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner
      - name: Cache dotNet code coverage
        id: cache-sonar-coverage
        uses: actions/cache@v4
        with:
          path: ./.sonar/coverage
          key: ${{ runner.os }}-sonar-coverage
          restore-keys: ${{ runner.os }}-sonar-coverage
      - name: Install SonarQube Cloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner
      - name: Install dotNet code coverage
        if: steps.cache-sonar-coverage.outputs.cache-hit != 'true'
        run: |
          mkdir -p ./.sonar/coverage
          dotnet tool update dotnet-coverage --tool-path ./.sonar/coverage
      - name: Build and analyze
        if: github.actor != 'dependabot[bot]'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin \
          /k:"DEFRA_identity-service-helper" \
          /o:"defra" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.host.url="https://sonarcloud.io" \
          /d:sonar.cs.vscoveragexml.reportsPaths=coverage.xml \
          /d:sonar.exclusions="changelog/**"
          dotnet build --no-incremental
          ./.sonar/coverage/dotnet-coverage collect "dotnet test" -f xml -o "coverage.xml"
          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
